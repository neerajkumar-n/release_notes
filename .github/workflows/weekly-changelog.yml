name: Weekly HyperSwitch Changelog Summary

# Fully automated: schedule only, no manual trigger.
# Every Wednesday at 04:30 UTC = 10:00 AM IST (India has no DST, fixed +05:30 offset).
on:
  schedule:
    - cron: '30 4 * * 3'

permissions:
  contents: read

env:
  # Non-sensitive configuration — repository variables (Settings > Secrets and
  # variables > Actions > Variables). Switch any of these to `secrets.X` if
  # you'd rather treat them as sensitive.
  CHANGELOG_SOURCE_PATH: ${{ vars.CHANGELOG_SOURCE_PATH }}
  AI_API_BASE_URL: ${{ vars.AI_API_BASE_URL }}
  AI_MODEL_NAME: ${{ vars.AI_MODEL_NAME }}
  SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
  SANITY_DATASET: ${{ vars.SANITY_DATASET }}
  SANITY_DOCUMENT_TYPE: ${{ vars.SANITY_DOCUMENT_TYPE }}
  # Sensitive values — GitHub Secrets only.
  AI_API_KEY: ${{ secrets.AI_API_KEY }}
  SANITY_API_TOKEN: ${{ secrets.SANITY_API_TOKEN }}

jobs:
  extract:
    name: Extract changelog
    runs-on: ubuntu-latest
    outputs:
      has_entries: ${{ steps.check.outputs.has_entries }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and parse changelog
        run: npm run fetch-changelog

      - name: Check whether any entries were found
        id: check
        if: always()
        run: |
          if [ -f artifacts/raw-changelog.json ]; then
            COUNT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('artifacts/raw-changelog.json','utf8')).entries.length)")
            if [ "$COUNT" -gt 0 ]; then
              echo "has_entries=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_entries=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_entries=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload raw changelog artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-changelog
          path: artifacts/raw-changelog.json
          retention-days: 3
          if-no-files-found: ignore

  summarize:
    name: Summarize with AI
    needs: extract
    if: needs.extract.outputs.has_entries == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download raw changelog artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-changelog
          path: artifacts

      - name: Summarize with AI
        run: npm run summarize

      - name: Upload AI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-summary
          path: |
            artifacts/ai-request.json
            artifacts/summary.md
          retention-days: 3
          if-no-files-found: ignore

  publish:
    name: Publish to Sanity
    needs: [extract, summarize]
    if: needs.extract.outputs.has_entries == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download raw changelog artifact
        uses: actions/download-artifact@v4
        with:
          name: raw-changelog
          path: artifacts

      - name: Download AI summary artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-summary
          path: artifacts

      - name: Publish to Sanity
        run: npm run publish
